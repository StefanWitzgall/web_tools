    <style>
        /* This sets the dark theme */
        body {
            background-color: #121212; /* Deep black/grey */
            color: #ffffff;            /* Pure white text */
            font-family: sans-serif;   /* Cleaner look */
            margin: 0;
            padding: 2rem;
            line-height: 1.6;

        /* Optional: Makes links easier to read on dark background */

<body class="dark-mode">

    <button id="theme-toggle" onclick="toggleTheme()">☀ / 🌙</button>
    <script src="script.js"></script>
    <script>
        function toggleTheme() {
            // This flips the 'dark-mode' class on or off
            document.body.classList.toggle('dark-mode');
            
            // Optional: Update button text/icon based on mode
            const btn = document.getElementById('theme-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerText = "🌙 Night";
            } else {
                btn.innerText = "☀ Day";
            }
        }
    </script>

</body>
